<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ananias&family=Montserrat&display=swap">
    <link rel="stylesheet" href="./css/style.css">
    <title>Projetos - Rapecca</title>
    <style>
        body {
            background-image: url('../img/ferramentasRed.png');
            background-repeat: repeat-y;
            background-position: right top;
            background-size: auto 1300px;
            background-color: #9AA36A;
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-wrapper">
            <img src="./img/logoRapecca.png" alt="Logo Rapecca">
            <nav>
                <ul>
                    <li><a href="index.html">Rapecca</a></li>
                    <li><a href="Projetos.html">Projetos</a></li>
                    <li><a href="CSA.html">CSA</a></li>
                    <li><a href="Sobre-nos.html">Sobre nós</a></li>
                    <li><a href="Participe.html">Participe</a></li>
                    <li><a href="Livreto.html">Livreto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <p class="inicio-link" style="margin-top: 100px;">
                <a href="Projetos.html">← Ver todos os projetos</a>
            </p>
            <div class="post-container" id="post-container">
                <p style="text-align: center; padding: 40px 0;">Carregando...</p>
            </div>
            <p class="inicio-link">
                <a href="Projetos.html">← Ver todos os projetos</a>
            </p>
        </section>
    </main>

    <script>
        async function carregarDetalhes() {
            const container = document.getElementById('post-container');
            const pbUrl = 'https://rapecca.uber.space';

            const params = new URLSearchParams(window.location.search);
            const postId = params.get('id');

            if (!postId) {
                window.location.href = 'Projetos.html';
                return;
            }

            try {
                const response = await fetch(`${pbUrl}/api/collections/posts/records/${postId}`);

                if (!response.ok) throw new Error('Projeto não encontrado');

                const post = await response.json();

                // Atualiza o título da aba com o nome do post
                document.title = `${post.Titulo} — Rapecca`;

                // Formata a data de publicação em português
                const dataFormatada = new Date(post.created).toLocaleDateString('pt-BR', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });

                const fotoUrl = post.Capa
                    ? `${pbUrl}/api/files/${post.collectionId}/${post.id}/${post.Capa}`
                    : null;

                const imagemHTML = fotoUrl
                    ? `<img src="${fotoUrl}" alt="${post.Titulo}" class="post-image">`
                    : '';

                container.innerHTML = `
                   <div class="post-header">
                        <p class="book-eyebrow">Rapecca</p>
                        <h1 class="post-title">${post.Titulo}</h1>
                        <p class="post-date">${dataFormatada}</p>
                    </div>
                    ${imagemHTML}
                    <div class="post-content">
                        ${post.Texto}
                    </div>
                `;

            } catch (error) {
                console.error("Erro:", error);
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px 0;">
                        <h2 style="color: #0F4129;">Ops! Projeto não encontrado.</h2>
                        <p>O projeto pode ter sido removido ou o servidor está offline.</p>
                    </div>
                `;
            }
        }

        carregarDetalhes();
    </script>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-item">
                <strong>Instagram</strong>
                <a class="instagram-link" href="https://www.instagram.com/rapecca.agroecologia" target="_blank" rel="noopener noreferrer">
                    <img src="./img/Instagram_icon.png" alt="Instagram" class="instagram-icon">
                    <span>Rapecca</span>
                </a>
            </div>
            <div class="footer-item">
                <strong>Email</strong>
                <p>contato@rappecca.com.br</p>
            </div>
        </div>
    </footer>
</body>
</html>
